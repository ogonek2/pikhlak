              type: integer
            actions:
              type: array
              items:
                $ref: '#/components/schemas/BotAction'

    BotAction:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum:
            - send_message
            - edit_message
            - delete_message
            - send_media
            - answer_callback
            - typing
            - delay
        chat_id:
          type: integer
          format: int64
        message_id:
          type: integer
        text:
          type: string
        parse_mode:
          type: string
          enum: [HTML, Markdown, MarkdownV2]
        reply_markup:
          $ref: '#/components/schemas/TelegramReplyMarkup'
        media:
          type: array
          items:

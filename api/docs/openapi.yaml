                callback_data:
                  type: string
                url:
                  type: string
        keyboard:
          type: array
          items:
            type: array
            items:
              type: object
              properties:
                text:
                  type: string
        resize_keyboard:
          type: boolean
        one_time_keyboard:
          type: boolean
